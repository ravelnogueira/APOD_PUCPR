name: CI - Validate Static APOD App

on:
  pull_request:
    branches: ["main"]
  push:
    branches:
      - "feature/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check required files
        run: |
          required_files=("index.html" "style.css" "script.js" "README.md")
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

      - name: Validate required HTML IDs
        run: |
          ids=("dateInput" "searchButton" "statusMessage" "resultSection" "mediaContainer" "apodTitle" "apodDate" "apodDescription" "apodCopyright")
          for id in "${ids[@]}"; do
            if ! grep -q "id=\"$id\"" index.html; then
              echo "Missing required HTML id: $id"
              exit 1
            fi
          done

      - name: Validate JavaScript syntax
        run: node --check script.js
